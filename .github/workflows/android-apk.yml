name: Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-apk:
    name: Build Capacitor APK
    runs-on: ubuntu-latest

    env:
      PUBLIC_API_BASE_URL: ${{ secrets.PUBLIC_API_BASE_URL || vars.PUBLIC_API_BASE_URL }}
      PUBLIC_FIREBASE_API_KEY: ${{ secrets.PUBLIC_FIREBASE_API_KEY || vars.PUBLIC_FIREBASE_API_KEY }}
      PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.PUBLIC_FIREBASE_AUTH_DOMAIN || vars.PUBLIC_FIREBASE_AUTH_DOMAIN }}
      PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.PUBLIC_FIREBASE_PROJECT_ID || vars.PUBLIC_FIREBASE_PROJECT_ID }}
      PUBLIC_FIREBASE_APP_ID: ${{ secrets.PUBLIC_FIREBASE_APP_ID || vars.PUBLIC_FIREBASE_APP_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Update npm
        run: npm install -g npm@11.6.1

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Verify Java runtime
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          java -version
          javac -version

      - name: Install dependencies
        run: npm install

      - name: Build mobile web bundle
        run: npm run build:mobile

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Build debug APK
        run: |
          echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties
          chmod +x android/gradlew
          cd android
          ./gradlew --version
          ./gradlew assembleDebug

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/Qurio.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Qurio.apk
          path: android/app/build/outputs/apk/debug/Qurio.apk

      - name: Move latest Android release tag
        if: github.ref == 'refs/heads/master'
        run: |
          git tag -f android-latest "$GITHUB_SHA"
          git push -f origin android-latest

      - name: Publish APK to latest GitHub Release
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: Latest Android APK
          body: Latest debug APK built from main.
          make_latest: true
          overwrite_files: true
          files: android/app/build/outputs/apk/debug/Qurio.apk

      - name: Publish APK to versioned GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          overwrite_files: true
          files: android/app/build/outputs/apk/debug/Qurio.apk